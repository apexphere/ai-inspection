# OpenClaw Inspector Configuration
# Environment variables: ANTHROPIC_API_KEY, API_URL, API_KEY
# Optional: DISCORD_ALERT_WEBHOOK (for alerts)

agents:
  inspector:
    enabled: true
    model: claude-sonnet-4
    workspace: /app/agents/inspector/workspace
    # Heartbeat for connection monitoring (every 5 min during business hours)
    heartbeat:
      every: "5m"
      activeHours:
        start: "07:00"
        end: "18:00"
        timezone: "Pacific/Auckland"
      prompt: "Connection health check"
      target: "none"  # Internal only, no delivery

channels:
  whatsapp:
    enabled: true
    dmPolicy: allowlist
    # allowFrom configured via OPENCLAW_WHATSAPP_ALLOWLIST env var
    # Format: comma-separated phone numbers (+6421...,+6422...)
    session:
      dmScope: agent  # Each phone number gets own session
    ackReaction:
      emoji: "👀"
      direct: true

mcp:
  servers:
    inspection:
      command: ["node", "/app/server/dist/index.js"]
      env:
        API_URL: "${API_URL}"
        API_KEY: "${API_KEY}"

gateway:
  host: "0.0.0.0"
  port: 3000

# Logging configuration for Railway
logging:
  level: info
  consoleLevel: info
  consoleStyle: json  # JSON format for Railway log aggregation
  redactSensitive: tools  # Redact sensitive data in tool outputs

# Diagnostics for monitoring
diagnostics:
  enabled: true
  flags:
    - "whatsapp.*"  # Log WhatsApp connection events
