# Design Tokens — AI Inspection
# Source of truth for all design values
# Aligns with shadcn/ui + Tailwind CSS
# Reference: docs/design/014-design-system.md

metadata:
  version: "1.0.0"
  updated: "2026-02-23"
  author: "Alice"

# =============================================================================
# COLORS
# =============================================================================
colors:
  # ---------------------------------------------------------------------------
  # Primary Brand (Blue)
  # Use: Primary actions, links, focus states
  # ---------------------------------------------------------------------------
  primary:
    50: "#eff6ff"
    100: "#dbeafe"
    200: "#bfdbfe"
    300: "#93c5fd"
    400: "#60a5fa"
    500: "#3b82f6"
    600: "#2563eb"   # ← Primary action color
    700: "#1d4ed8"
    800: "#1e40af"
    900: "#1e3a8a"
    DEFAULT: "#2563eb"

  # ---------------------------------------------------------------------------
  # Semantic Colors
  # Use: Status indicators, feedback, alerts
  # ---------------------------------------------------------------------------
  semantic:
    success: "#16a34a"   # green-600 — Completed, valid, positive
    warning: "#ca8a04"   # yellow-600 — Caution, pending, attention
    error: "#dc2626"     # red-600 — Error, invalid, destructive
    info: "#2563eb"      # blue-600 — Information, help

  # ---------------------------------------------------------------------------
  # Neutrals (Gray Scale)
  # Use: Text, backgrounds, borders
  # ---------------------------------------------------------------------------
  neutral:
    50: "#f9fafb"    # surface, subtle backgrounds
    100: "#f3f4f6"
    200: "#e5e7eb"   # borders
    300: "#d1d5db"
    400: "#9ca3af"
    500: "#6b7280"   # muted text
    600: "#4b5563"
    700: "#374151"
    800: "#1f2937"
    900: "#111827"   # foreground, headings
    950: "#030712"

  # ---------------------------------------------------------------------------
  # Semantic Aliases (for CSS variables / Tailwind)
  # ---------------------------------------------------------------------------
  aliases:
    background: "#ffffff"
    foreground: "#111827"    # neutral-900
    surface: "#f9fafb"       # neutral-50
    border: "#e5e7eb"        # neutral-200
    muted: "#6b7280"         # neutral-500
    muted-foreground: "#6b7280"

# =============================================================================
# TYPOGRAPHY
# =============================================================================
typography:
  # ---------------------------------------------------------------------------
  # Font Families
  # ---------------------------------------------------------------------------
  fonts:
    sans: "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
    mono: "ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace"

  # ---------------------------------------------------------------------------
  # Font Sizes (with Tailwind class mapping)
  # ---------------------------------------------------------------------------
  sizes:
    xs:
      value: "0.75rem"    # 12px
      lineHeight: "1rem"  # 16px
      class: "text-xs"
    sm:
      value: "0.875rem"   # 14px
      lineHeight: "1.25rem"  # 20px
      class: "text-sm"
    base:
      value: "1rem"       # 16px
      lineHeight: "1.5rem"   # 24px
      class: "text-base"
    lg:
      value: "1.125rem"   # 18px
      lineHeight: "1.75rem"  # 28px
      class: "text-lg"
    xl:
      value: "1.25rem"    # 20px
      lineHeight: "1.75rem"  # 28px
      class: "text-xl"
    2xl:
      value: "1.5rem"     # 24px
      lineHeight: "2rem"     # 32px
      class: "text-2xl"
    3xl:
      value: "1.875rem"   # 30px
      lineHeight: "2.25rem"  # 36px
      class: "text-3xl"

  # ---------------------------------------------------------------------------
  # Font Weights
  # ---------------------------------------------------------------------------
  weights:
    normal: 400
    medium: 500
    semibold: 600
    bold: 700

  # ---------------------------------------------------------------------------
  # Text Styles (composite)
  # Use these for consistent hierarchy
  # ---------------------------------------------------------------------------
  styles:
    h1:
      description: "Page titles"
      classes: "text-2xl font-semibold text-gray-900"
    h2:
      description: "Section titles"
      classes: "text-xl font-semibold text-gray-900"
    h3:
      description: "Card titles"
      classes: "text-lg font-medium text-gray-900"
    body:
      description: "Default text"
      classes: "text-base text-gray-700"
    small:
      description: "Secondary text"
      classes: "text-sm text-gray-600"
    muted:
      description: "Helper text, captions"
      classes: "text-sm text-gray-500"
    label:
      description: "Form labels"
      classes: "text-sm font-medium text-gray-700"

# =============================================================================
# SPACING
# =============================================================================
spacing:
  description: "Use ONLY these values. No arbitrary spacing."
  scale:
    0: "0px"
    0.5: "2px"
    1: "4px"       # Tight inline spacing
    1.5: "6px"     # Icon gaps
    2: "8px"       # Related elements
    3: "12px"      # Section padding (small)
    4: "16px"      # Card padding, gaps
    5: "20px"
    6: "24px"      # Section spacing
    8: "32px"      # Major sections
    10: "40px"
    12: "48px"     # Page sections
    16: "64px"
    20: "80px"
    24: "96px"

  # Common usage patterns
  patterns:
    card-padding: "6"      # p-6 (24px)
    card-gap: "4"          # gap-4 (16px)
    section-gap: "6"       # space-y-6 (24px)
    form-field-gap: "2"    # space-y-2 (8px)
    page-padding-x: "6"    # px-6 (24px)
    page-padding-y: "8"    # py-8 (32px)
    inline-gap: "2"        # gap-2 (8px)
    icon-gap: "1.5"        # gap-1.5 (6px)

# =============================================================================
# BORDERS
# =============================================================================
borders:
  # ---------------------------------------------------------------------------
  # Border Radius
  # ---------------------------------------------------------------------------
  radius:
    none: "0px"
    sm: "0.125rem"    # 2px
    DEFAULT: "0.25rem" # 4px
    md: "0.375rem"    # 6px
    lg: "0.5rem"      # 8px — Buttons, inputs
    xl: "0.75rem"     # 12px — Cards
    2xl: "1rem"       # 16px — Modals
    full: "9999px"    # Pills, badges, avatars

  # Component-specific radius
  components:
    button: "lg"       # rounded-lg (8px)
    input: "lg"        # rounded-lg (8px)
    card: "xl"         # rounded-xl (12px)
    modal: "2xl"       # rounded-2xl (16px)
    badge: "full"      # rounded-full
    avatar: "full"     # rounded-full

  # ---------------------------------------------------------------------------
  # Border Widths
  # ---------------------------------------------------------------------------
  widths:
    0: "0px"
    DEFAULT: "1px"
    2: "2px"

# =============================================================================
# SHADOWS
# =============================================================================
shadows:
  # Elevation levels
  levels:
    none:
      value: "none"
      use: "Flat elements"
    sm:
      value: "0 1px 2px 0 rgb(0 0 0 / 0.05)"
      class: "shadow-sm"
      use: "Cards, containers"
    DEFAULT:
      value: "0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)"
      class: "shadow"
      use: "Elevated cards"
    md:
      value: "0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)"
      class: "shadow-md"
      use: "Dropdowns, popovers"
    lg:
      value: "0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)"
      class: "shadow-lg"
      use: "Modals, dialogs"
    xl:
      value: "0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)"
      class: "shadow-xl"
      use: "Large modals"

  # Component defaults
  components:
    card: "sm"
    dropdown: "md"
    modal: "lg"
    popover: "md"
    tooltip: "md"

# =============================================================================
# BREAKPOINTS
# =============================================================================
breakpoints:
  description: "Mobile-first responsive design"
  values:
    sm: "640px"      # Small tablets
    md: "768px"      # Tablets
    lg: "1024px"     # Small laptops
    xl: "1280px"     # Desktops
    2xl: "1536px"    # Large screens

  # Layout constraints
  layout:
    max-width: "1280px"  # max-w-7xl
    content-max: "768px" # max-w-3xl (prose content)

# =============================================================================
# Z-INDEX
# =============================================================================
zIndex:
  description: "Stacking order for overlays and UI layers"
  values:
    base: 0
    dropdown: 10
    sticky: 20
    fixed: 30
    modalBackdrop: 40
    modal: 50
    popover: 60
    tooltip: 70

# =============================================================================
# TRANSITIONS
# =============================================================================
transitions:
  duration:
    fast: "150ms"
    DEFAULT: "200ms"
    slow: "300ms"

  timing:
    DEFAULT: "cubic-bezier(0.4, 0, 0.2, 1)"  # ease-in-out
    in: "cubic-bezier(0.4, 0, 1, 1)"
    out: "cubic-bezier(0, 0, 0.2, 1)"

# =============================================================================
# USAGE GUIDELINES
# =============================================================================
guidelines:
  general:
    - "Use design tokens exclusively — no arbitrary values"
    - "Import shadcn/ui components from @/components/ui/*"
    - "Use variant props instead of style overrides"

  colors:
    - "Primary actions: bg-primary (blue-600)"
    - "Text: text-foreground (gray-900), text-muted-foreground (gray-500)"
    - "Backgrounds: bg-background (white), bg-muted (gray-50)"
    - "Never use arbitrary color values (#abc123)"

  spacing:
    - "Use only the defined spacing scale"
    - "Cards: p-6, gap-4"
    - "Sections: space-y-6"
    - "Form fields: space-y-2"
    - "No arbitrary spacing (p-[13px])"

  typography:
    - "Use predefined text styles for consistency"
    - "Page title: text-2xl font-semibold"
    - "Section title: text-xl font-semibold"
    - "Card title: text-lg font-medium"

  layout:
    - "Page max-width: max-w-7xl mx-auto"
    - "Page padding: px-6 py-8"
    - "Mobile-first responsive design"

  dont:
    - "Don't use inline styles"
    - "Don't invent color values"
    - "Don't use arbitrary spacing"
    - "Don't create custom button/input components"
    - "Don't override shadcn component styles directly"
