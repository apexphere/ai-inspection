services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ai_inspection}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      target: dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_inspection}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      NODE_ENV: development
      PORT: 3000
      TEST_PASSWORD: ${TEST_PASSWORD:-test123}
    volumes:
      - ./api/src:/app/src
      - ./api/prisma:/app/prisma
      - ./test:/workspace/test
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["npx", "tsx", "watch", "src/index.ts"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret}
      NEXTAUTH_URL: http://localhost:3001
      NODE_ENV: development
    volumes:
      - ./web:/app/web
      - ./shared:/app/shared
      - /app/web/.next
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
