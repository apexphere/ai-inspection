services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ai_inspection}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-ai_inspection}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      target: dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ai_inspection}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      REDIS_URL: redis://redis:6379
      ADMIN_USER_IDS: 85e7d6fb-d22a-4204-9997-8a398e2aadf9
      NODE_ENV: development
      PORT: 3000
      TEST_PASSWORD: ${TEST_PASSWORD:-test123}
    volumes:
      - ./api/src:/app/src
      - ./api/prisma:/app/prisma
      - ./api/package.json:/app/package.json
      - ./api/docker-entrypoint.sh:/app/docker-entrypoint.sh
      - ./node_modules:/workspace/node_modules
      - ./test:/workspace/test
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["/workspace/node_modules/.bin/tsx", "watch", "src/index.ts"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret}
      NEXTAUTH_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3000
      NODE_ENV: development
    volumes:
      - ./web:/app/web
      - ./shared:/app/shared
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  api_uploads:
